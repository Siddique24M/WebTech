<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SunMoonLoginPage</title>
    <link rel="stylesheet" href="SunMoonLoginPage.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  </head>
  <body>
    <form action="" id="login_form_container">
        <i class="fa-solid fa-user icon_textfield" id="username_icon"></i>
        <i class="fa-solid fa-key icon_textfield" id="password_icon"></i>
        <h1 id="login_heading">Login</h1>
        <input type="text" class="login_textfields" placeholder="Username" />
      <input type="password" class="login_textfields" placeholder="Password" />
      <a href="#" id="forget_password_link">Forget Password?</a>
      <button id="submit_button">
          <span class="submit_button_tools">Submit</span>
          <span class="submit_button_tools"> </span>
        </button>
        <p id="or_continue_with">or continue with</p>
        <div id="login_icon_containers">
            <span class="login_icons">
                <i class="fa-brands fa-google icons"></i>
            </span>
            <span class="login_icons">
                <i class="fa-brands fa-facebook icons"></i>
            </span>
            <span class="login_icons">
                <i class="fa-brands fa-github icons"></i>
            </span>
        </div>
        <p id="dont_have_an_account">Don't have an Account?</p>
        <a href="#" id="register_link">Register for free</a>
    </form>
    <header id="mountain_container"></header>
  </body>
</html>
