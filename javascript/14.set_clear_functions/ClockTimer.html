<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClockTimer</title>
    <link rel="stylesheet" href="./ClockTimer.css">
    <script src="./ClockTimer.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>
<body>
    <div id="clock_timer_container">
        <div id="clock_timer">10</div>
    </div>
    <div id="clock_timer_icon_container">
        <span id="play_icon_container">
            <i class="fa-solid fa-play clock_timer_icons"></i>
        </span>
        <span id="reset_icon_container">
            <i class="fa-solid fa-arrow-rotate-right clock_timer_icons"></i>
        </span>
    </div>
</body>
</html>
